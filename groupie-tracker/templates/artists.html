<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Artists - Groupie Tracker</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <header>
        <h1>Artists</h1>
        <a href="/">Back to home</a>
    </header>

    <main>
        <!-- Search form -->
        <form action="/artists" method="GET">
            <input type="text" name="q" placeholder="Search by name..." value="{{.Query}}">
            <button type="submit">Search</button>
        </form>

        <p>{{.StatusMessage}}</p>

        {{if .Artists}}
            <div class="artist-grid">
                {{range .Artists}}
                    <article class="artist-card">
                        <img src="{{.Image}}" alt="{{.Name}}">
                        <h2><a href="/artist?id={{.ID}}">{{.Name}}</a></h2>
                        <p>Created in: {{.CreationDate}}</p>
                        <p>First album: {{.FirstAlbum}}</p>
                        <h3>Members</h3>
                        <ul>
                            {{range .Members}}
                            <li>{{.}}</li>
                            {{end}}
                        </ul>
                    </article>
                {{end}}
            </div>
        {{else}}
            <p class="no-artists">No artists to display.</p>
        {{end}}
    </main>
</body>
</html>
